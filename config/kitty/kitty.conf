# ============================================
# Kitty config - Kanagawa Dragon / Dimmed Monokai
# ============================================
# ===

# Snap OS window resize to character cells (xterm-like; keeps vim grid in sync)
resize_in_steps yes

# Anchor terminal grid at top-left so it grows to fill the window on resize/maximize
placement_strategy top-left

# BEGIN_KITTY_FONTS
font_family      DejaVu Sans Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

font_size 11.2
disable_ligatures always
text_composition_strategy legacy

# Icons (eza, Starship git glyph, powerline, etc.) via Symbols Nerd Font Mono
# Debug missing glyphs: kitty --debug-font-fallback
symbol_map U+E000-U+E00D Symbols Nerd Font Mono
symbol_map U+E0A0-U+E0A2,U+E0B0-U+E0B3 Symbols Nerd Font Mono
symbol_map U+E0A3-U+E0A3,U+E0B4-U+E0C8,U+E0CC-U+E0D2,U+E0D4-U+E0D4 Symbols Nerd Font Mono
symbol_map U+E5FA-U+E62C Symbols Nerd Font Mono
symbol_map U+E700-U+E7C5 Symbols Nerd Font Mono
symbol_map U+F000-U+F2E0 Symbols Nerd Font Mono
symbol_map U+E200-U+E2A9 Symbols Nerd Font Mono
symbol_map U+F400-U+F4A8,U+2665,U+26A1,U+F27C Symbols Nerd Font Mono
symbol_map U+F300-U+F313 Symbols Nerd Font Mono
symbol_map U+23FB-U+23FE,U+2B58 Symbols Nerd Font Mono
symbol_map U+F500-U+FD46 Symbols Nerd Font Mono
symbol_map U+E300-U+E3EB Symbols Nerd Font Mono
symbol_map U+F0001-U+F1FFF Symbols Nerd Font Mono

# Keep nerd/powerline prompt glyphs single-width (avoids blank cell after  )
narrow_symbols U+E0A0-U+E0B3,U+E0B4-U+E0C8 1

# --- Window ---
initial_window_width 150c
initial_window_height 38c
window_padding_width 2 2
hide_window_decorations titlebar-only
remember_window_size no

# --- Scrollback ---
scrollback_lines 10000

# --- Mouse & Selection ---
mouse_hide_wait 0.0
copy_on_select yes

clipboard_control write-clipboard write-primary read-clipboard read-primary

mouse_map shift+left press ungrabbed mouse_selection normal
mouse_map shift+left press grabbed mouse_selection normal

mouse_map shift+middle release ungrabbed paste_from_selection

select_by_word_characters :@-./_~?&=%+#

# --- Theme ---
# BEGIN_KITTY_THEME
# Dimmed Monokai
include current-theme.conf
# END_KITTY_THEME

# ============================================
# Custom key bindings and overrides
# Placed after the theme so they take precedence
# ============================================

# Xterm-style scrolling with Shift+Page keys
# (using the action names that work reliably for this setup)
map shift+page_up   scroll_page_up
map shift+page_down scroll_page_down

# Fallbacks without Shift
map page_up   scroll_page_up
map page_down scroll_page_down

# Scrollback search
map ctrl+shift+f show_scrollback

# Font size zoom with Ctrl + mouse wheel
map ctrl+shift+wheel_up   increase_font_size
map ctrl+shift+wheel_down decrease_font_size
map ctrl+0                set_font_size 11.0

#include overrides.conf



