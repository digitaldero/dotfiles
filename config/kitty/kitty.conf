# ============================================
# Kitty config - Kanagawa Dragon / Dimmed Monokai
# ============================================
# ===

# Snap OS window resize to character cells (xterm-like; keeps vim grid in sync)
resize_in_steps yes

# Anchor terminal grid at top-left so it grows to fill the window on resize/maximize
placement_strategy top-left

#font_family      JetBrainsMono Nerd Font Mono
#bold_font        JetBrainsMono Nerd Font Mono Bold
#italic_font      JetBrainsMono Nerd Font Mono Italic
#bold_italic_font JetBrainsMono Nerd Font Mono Bold Italic

# BEGIN_KITTY_FONTS
font_family      family="DejaVu Sans Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

font_size 11.2
disable_ligatures always
text_composition_strategy legacy

# 2. Force-disable OpenType contextual symbols using your exact font names
#font_features JetBrainsMonoNFM-Regular           -liga -calt -clig -dlig
#font_features JetBrainsMonoNFM-SemiBold          -liga -calt -clig -dlig
#font_features JetBrainsMonoNFM-Italic            -liga -calt -clig -dlig
#font_features JetBrainsMonoNFM-SemiBoldItalic    -liga -calt -clig -dlig
# font_family      family="IBM Plex Mono"
# bold_font        auto
# italic_font      auto
# bold_italic_font auto

# --- Window ---
initial_window_width 150c
initial_window_height 38c
window_padding_width 0 0
hide_window_decorations titlebar-only
remember_window_size no

# --- Scrollback ---
scrollback_lines 10000

# --- Mouse & Selection ---
mouse_hide_wait 0.0
copy_on_select yes

clipboard_control write-clipboard write-primary read-clipboard read-primary

mouse_map shift+left press ungrabbed mouse_selection normal
mouse_map shift+left press grabbed mouse_selection normal

mouse_map shift+middle release ungrabbed paste_from_selection

select_by_word_characters :@-./_~?&=%+#

# --- Theme ---
# BEGIN_KITTY_THEME
# Dimmed Monokai
include current-theme.conf
# END_KITTY_THEME

# ============================================
# Custom key bindings and overrides
# Placed after the theme so they take precedence
# ============================================

# Xterm-style scrolling with Shift+Page keys
# (using the action names that work reliably for this setup)
map shift+page_up   scroll_page_up
map shift+page_down scroll_page_down

# Fallbacks without Shift
map page_up   scroll_page_up
map page_down scroll_page_down

# Scrollback search
map ctrl+shift+f show_scrollback

# Font size zoom with Ctrl + mouse wheel
map ctrl+shift+wheel_up   increase_font_size
map ctrl+shift+wheel_down decrease_font_size
map ctrl+0                set_font_size 11.0

#include overrides.conf



