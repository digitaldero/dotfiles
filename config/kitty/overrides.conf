# ============================================
# User overrides - included LAST
# These settings are loaded after the Kanagawa theme so they should win.
# ============================================

# Solid block cursor like xterm, no blinking
cursor_shape block
cursor_blink_interval 0

# Xterm-style scrolling with Shift+Page keys
map shift+page_up   scroll_page_up
map shift+page_down scroll_page_down

# Fallbacks without Shift (in case)
map page_up   scroll_page_up
map page_down scroll_page_down

# Scrollback search
map ctrl+shift+f show_scrollback

# Raw CSI sequence fallbacks (very reliable)
map \x1b[5;2~ scroll_page_up
map \x1b[6;2~ scroll_page_down
