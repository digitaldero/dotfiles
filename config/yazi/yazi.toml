[manager]
show_hidden = false
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"

[preview]
image_backend = "kitty"
image_filter = "lanczos3"
image_quality = 90
max_width = 1400
max_height = 900

# Open rules - modern Yazi syntax
[open]
rules = [
  { url = "*.md",  use = "edit" },
  { url = "*.txt", use = "edit" },
  { url = "*.rs",  use = "edit" },
  { url = "*.toml", use = "edit" },
  { url = "*.sh",  use = "edit" },

  # Media files
  { mime = "video/*", use = "play" },
  { mime = "audio/*", use = "play" },
  { mime = "image/*", use = "view" },
]

[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = "Edit with nvim" },
]
play = [
  { run = 'mpv "$@"', orphan = true, desc = "Play with mpv" },
]
view = [
  { run = 'feh "$@"', orphan = true, desc = "View with feh" },
]
