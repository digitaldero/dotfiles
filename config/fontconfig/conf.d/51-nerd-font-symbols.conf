<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Fallback to symbols font for missing nerd/powerline glyphs -->
  <alias>
    <family>monospace</family>
    <prefer><family>Symbols Nerd Font Mono</family></prefer>
  </alias>
  <alias>
    <family>DejaVu Sans Mono</family>
    <prefer><family>Symbols Nerd Font Mono</family></prefer>
  </alias>
</fontconfig>