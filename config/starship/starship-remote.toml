# Starship config - REMOTE variant
# Loaded automatically over SSH via STARSHIP_CONFIG (see shell rc snippet)
# Same layout as the local config, but themed red/orange with a REMOTE banner
# so it's unmistakable that you're not on your local machine.

format = """
${custom.remote}\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$character
"""

# Loud, always-on banner. command just needs to succeed; we don't use $output.
[custom.remote]
command = "true"
when = true
format = "[ 🖥  REMOTE ]($style)"
style = "bg:red fg:white bold"

[character]
success_symbol = "[❯](bold 208)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"

[username]
style_user = "bold 208"
style_root = "bold red"
format = "[$user]($style)@"
#show_always = true

[hostname]
ssh_symbol = "🌐 "
style = "bold red"
format = "[$hostname]($style) "
#show_always = true

[directory]
style = "bold 208"
format = "[$path ]($style)[$read_only]($read_only_style)"
truncate_to_repo = true
truncation_length = 4
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bold red"
format = "[$symbol $branch]($style)"
truncation_length = 24

[git_state]
style = "bold 208"
format = "[ $state( $progress_current/$progress_total)]($style)"
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"

[git_status]
style = "bold red"
format = " [$all_status$ahead_behind]($style)"
conflicted = "󰞇 "
ahead = "󰁝${count}"
behind = "󰁅${count}"
diverged = "󰁝${ahead_count}󰁅${behind_count}"
untracked = "󰋗 "
stashed = "󰏗 "
modified = " "
staged = "󰄬 "
renamed = "󰁔 "
deleted = "󰩺 "

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "208"

[time]
disabled = true
format = "[$time]($style) "
time_format = "%H:%M"
style = "dimmed white"
