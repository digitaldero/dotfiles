# Starship config - Tailored for the user
# Works great in Kitty

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$character
"""

# Right side prompt (optional, can add time, cmd duration etc later)
# right_format = "$cmd_duration"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"

[username]
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style)@"
show_always = true

[hostname]
ssh_symbol = "🌐 "
style = "bold yellow"
format = "[$hostname]($style) "

[directory]
style = "bold cyan"
format = "[$path ]($style)[$read_only]($read_only_style)"
truncate_to_repo = true
truncation_length = 4
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol $branch]($style)"
truncation_length = 24

[git_state]
style = "bold yellow"
format = "[ $state( $progress_current/$progress_total)]($style)"
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
#[git_state]
#style = "bold yellow"
#format = "[ $state( $progress_current/$progress_total)]($style)"
#rebase = "󰘬"
#merge = "󰘬"
#cherry_pick = "󰘴"
#revert = "󰑐"
#bisect = "󰯇"
#am = "󰆓"
#am_or_rebase = "󰘬"


[git_status]
style = "bold red"
format = " [$all_status$ahead_behind]($style)"
conflicted = "󰞇 "
ahead = "󰁝${count}"
behind = "󰁅${count}"
diverged = "󰁝${ahead_count}󰁅${behind_count}"
untracked = "󰋗 "
stashed = "󰏗 "
modified = "󰏫 "
staged = "󰄬 "
renamed = "󰁔 "
deleted = "󰩺 "

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "yellow"

[time]
disabled = true
format = "[$time]($style) "
time_format = "%H:%M"
style = "dimmed white"
